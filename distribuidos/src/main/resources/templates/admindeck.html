{{>header}}

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">{{#id}}Editar Mazo{{/id}}{{^id}}Nuevo Mazo{{/id}}</h3>
                        <a href="/profile" class="btn btn-sm btn-secondary">← Volver al Perfil</a>
                    </div>
                    <div class="card-body">
                        <form id="mazo-form" action="/editDeck/{{id}}" method="POST">
                            <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
                            
                            {{#id}}<input type="hidden" name="id" value="{{id}}">{{/id}}

                            <div class="mb-3">
                                <label for="name" class="form-label fw-bold">Nombre del Mazo</label>
                                <input type="text" class="form-control" id="name" name="name" 
                                       value="{{#name}}{{name}}{{/name}}" 
                                       placeholder="Ej: Mi mazo agresivo" required>
                            </div>

                            <div class="mb-4">
                                <label for="description" class="form-label fw-bold">Descripción</label>
                                <textarea class="form-control" id="description" name="description" 
                                          rows="5" placeholder="Cuéntanos la estrategia de tu mazo...">{{#description}}{{description}}{{/description}}</textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <button type="submit" class="btn btn-success btn-lg px-5">
                                    {{#id}}Guardar Cambios{{/id}}{{^id}}Crear Mazo{{/id}}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

{{>footer}}
