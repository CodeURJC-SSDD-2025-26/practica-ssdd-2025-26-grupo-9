{{>header}}

<main class="py-5">
    <input type="hidden" id="rawLabels" value="{{#cardNames}}{{.}},{{/cardNames}}">
    <input type="hidden" id="rawData" value="{{#deckCounts}}{{.}},{{/deckCounts}}">
    <div class="container">
        <div class="text-center mb-5">
            <h1 class="display-4 text-dark mb-4">Bienvenido a OneDeck</h1>
            <p class="lead">Gestiona tus cartas y mazos de forma sencilla.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5"> <div class="card shadow border-0">
                    <div class="card-header bg-white text-center fw-bold">
                        Cartas meta
                    </div>
                    <div class="card-body d-flex justify-content-center align-items-center" style="min-height: 400px;">
                        <canvas id="favCardsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const labels = document.getElementById('rawLabels').value.split(',').filter(Boolean);
    const dataCounts = document.getElementById('rawData').value.split(',').filter(Boolean).map(Number);

    const ctx = document.getElementById('favCardsChart');

    
    if (ctx && labels.length > 0) {
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Presente en X mazos',
                    data: dataCounts,
                    backgroundColor: ['#ff6384', '#36a2eb', '#ffcd56', '#4bc0c0', '#9966ff', '#ff9f40', '#c9cbcf']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.raw + ' mazos';
                            }
                        }
                    }
                }
            }
        });
    } else {
        console.error("No hay datos o no se encontró el canvas");
    }
});
</script>

{{>footer}}
