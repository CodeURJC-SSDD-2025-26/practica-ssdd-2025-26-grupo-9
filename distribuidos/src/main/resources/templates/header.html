<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - OneDeck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="d-flex flex-column min-vh-100" style="background-color: #f4e4bc;">

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-custom-dark">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/">OneDeck</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        {{#isAdmin}}
                        <li class="nav-item"><a class="nav-link" href="/addCards">Administrar cartas</a></li>
                        <li class="nav-item"><a class="nav-link" href="/adminUsers">Administrar Usuarios</a></li>
                        {{/isAdmin}}
                        
                        <li class="nav-item"><a class="nav-link" href="/social">Social</a></li>
                        <li class="nav-item"><a class="nav-link" href="/decks">Mazos</a></li>

                        {{#logged}}
                        <li class="nav-item"><a class="nav-link fw-bold text-info" href="/profile">{{userName}} </a></li>
                        <li class="nav-item">
                            <form action="/logout" method="post" style="display:inline;">
                                <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
                                <button type="submit" class="nav-link btn btn-link" style="text-decoration:none;">Cerrar sesión</button>
                            </form>
                        </li>
                        {{/logged}}

                        {{^logged}}
                        <li class="nav-item"><a class="nav-link" href="/login">Iniciar sesión</a></li>
                        {{/logged}}
                    </ul>
                </div>
            </div>
        </nav>
    </header>
