{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">
                    <div class="card shadow border-0">
                        <div class="card-header bg-white py-3">
                            <h1 class="h4 mb-0 text-secondary">Editar Usuario</h1>
                        </div>
                        <div class="card-body p-4">
                            
                            <form action="/editUserAdmin" method="post" enctype="multipart/form-data">
                                
                                <input type="hidden" name="id" value="{{user.id}}">
                                <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">

                                <div class="text-center mb-4">
                                    <img src="/user/{{user.id}}/image" alt="Foto de perfil" class="rounded-circle border" 
                                         style="width: 120px; height: 120px; object-fit: cover;"
                                         onerror="this.src='/profileimages/default-avatar.png';">
                                </div>

                                <div class="mb-3">
                                    <label for="username" class="form-label fw-bold text-secondary">Nombre completo</label>
                                    <input type="text" class="form-control" id="username" name="username" value="{{user.username}}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="email" class="form-label fw-bold text-secondary">Correo electrónico</label>
                                    <input type="email" class="form-control" id="email" name="email" value="{{user.email}}" required>
                                </div>

                                <div class="mb-3">
                                    <label for="role" class="form-label fw-bold text-secondary">Rol</label>
                                    <select class="form-select" id="role" name="role" required>
                                        <option value="REGISTERED"selected>Usuario Registrado</option>
                                        <option value="ADMIN">Administrador</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label for="password" class="form-label fw-bold text-secondary">Nueva contraseña (dejar vacío para no cambiar)</label>
                                    <input type="password" class="form-control" id="password" name="password">
                                </div>

                                <div class="mb-4">
                                    <label for="imageFile" class="form-label fw-bold text-secondary">Foto de perfil (opcional)</label>
                                    <input type="file" class="form-control" id="imageFile" name="imageFile" accept="image/*">
                                </div>

                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <a href="/adminUsers" class="btn btn-secondary me-md-2">Cancelar</a>
                                    <button type="submit" class="btn btn-primary fw-bold">Guardar cambios</button>
                                </div>
                            </form>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
{{>footer}}
