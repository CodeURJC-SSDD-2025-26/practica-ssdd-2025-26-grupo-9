{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-10">
                    <div class="card shadow-sm border-0">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h3 class="mb-0">Detalles de la Carta</h3>
                            <a href="decks.html" class="btn btn-sm btn-outline-light"> Volver a Mazos</a>
                        </div>
                        <div class="card-body p-4">
                            <div class="row">
                                <div class="col-md-5 text-center mb-4 mb-md-0">
                                    <img src="/cardimages/Luffy.png" alt="Carta de Luffy"
                                        class="img-fluid rounded shadow"
                                        style="max-height: 500px; object-fit: contain;">
                                </div>

                                <div class="col-md-7">
                                    <h4 class="border-bottom pb-2 fw-bold">Luffy</h4>

                                    <div class="row mt-3">
                                        <div class="col-sm-6 mb-2">
                                            <span class="text-muted small text-uppercase">ID</span>
                                            <p class="fw-bold fs-5">101</p>
                                        </div>
                                        <div class="col-sm-6 mb-2">
                                            <span class="text-muted small text-uppercase">Tipo</span>
                                            <p class="fw-bold fs-5">Líder</p>
                                        </div>
                                        <div class="col-sm-6 mb-2">
                                            <span class="text-muted small text-uppercase">Color</span>
                                            <p class="fw-bold">Rojo</p>
                                        </div>
                                        <div class="col-sm-6 mb-2">
                                            <span class="text-muted small text-uppercase">Atributo</span>
                                            <p class="fw-bold">Strike</p>
                                        </div>
                                        <div class="col-sm-4 mb-2">
                                            <span class="text-muted small text-uppercase">Coste</span>
                                            <p class="fw-bold">-</p>
                                        </div>
                                        <div class="col-sm-4 mb-2">
                                            <span class="text-muted small text-uppercase">Poder</span>
                                            <p class="fw-bold">5000</p>
                                        </div>
                                        <div class="col-sm-4 mb-2">
                                            <span class="text-muted small text-uppercase">Vidas</span>
                                            <p class="fw-bold text-success">5</p>
                                        </div>
                                    </div>

                                    <div class="mb-3 mt-2">
                                        <span class="text-muted small text-uppercase">Clase</span>
                                        <p class="fw-bold">Straw Hat Crew Pirates</p>
                                    </div>

                                    <div class="bg-light p-3 rounded border mb-3">
                                        <span class="text-muted small text-uppercase fw-bold">Descripción</span>
                                        <p class="mb-0 mt-1"></p>
                                    </div>

                                    <div class="bg-light p-3 rounded border">
                                        <span class="text-muted small text-uppercase fw-bold">Trigger</span>
                                        <p class="mb-0 mt-1 fst-italic text-secondary">No tiene efecto trigger.</p>
                                    </div>

                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

{{>footer}}
