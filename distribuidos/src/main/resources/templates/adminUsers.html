{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            
            <div class="card shadow-sm border-0">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover mb-0 align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th scope="col" class="ps-4">ID</th>
                                    <th scope="col">Nombre</th>
                                    <th scope="col">Correo</th>
                                    <th scope="col">Rol</th>
                                    <th scope="col">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="users-list">
                                <tr data-id="1">
                                    <td class="ps-4">1</td>
                                    <td><a href="/profile" class="btn btn-link">Juan Pérez</a></td>
                                    <td>juan@example.com</td>
                                    <td>Usuario</td>
                                    <td>
                                        <a href="/editUserAdmin" class="btn btn-sm btn-primary me-1">Editar</a>
                                        <button class="btn btn-sm btn-danger" onclick="showDeleteUserModal(1)">Eliminar</button>
                                    </td>
                                </tr>
                                <tr data-id="2">
                                    <td class="ps-4">2</td>
                                    <td><a href="/profile" class="btn btn-link">María García</a></td>
                                    <td>maria@example.com</td>
                                    <td>Admin</td>
                                    <td>
                                        <a href="/editUserAdmin" class="btn btn-sm btn-primary me-1">Editar</a>
                                        <button class="btn btn-sm btn-danger" onclick="showDeleteUserModal(2)">Eliminar</button>
                                    </td>
                                </tr>
                                <tr data-id="3">
                                    <td class="ps-4">3</td>
                                    <td><a href="/profile" class="btn btn-link">Carlos López</a></td>
                                    <td>carlos@example.com</td>
                                    <td>Usuario</td>
                                    <td>
                                        <a href="/editUserAdmin" class="btn btn-sm btn-primary me-1">Editar</a>
                                        <button class="btn btn-sm btn-danger" onclick="showDeleteUserModal(3)">Eliminar</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function showDeleteUserModal(userId) {
            userToDelete = userId;
            const modal = new bootstrap.Modal(document.getElementById('deleteUserModal'));
            modal.show();
        }
        let userToDelete = null;
        function confirmDeleteUser() {
            if (!userToDelete) return;
            const row = document.querySelector(`tr[data-id="${userToDelete}"]`);
            if (!row) return;
            row.style.opacity = '0';
            row.style.transition = 'opacity 0.3s';
            setTimeout(() => {
                row.remove();
            }, 300);
            userToDelete = null;
        }
    </script>


    <div class="modal fade" id="deleteUserModal" tabindex="-1" aria-labelledby="deleteUserModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="deleteUserModalLabel">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body">
                    ¿Estás seguro de que quieres eliminar este usuario?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-danger" data-bs-dismiss="modal" onclick="confirmDeleteUser()">Eliminar</button>
                </div>
            </div>
        </div>
    </div>

</body>
{{>footer}}
