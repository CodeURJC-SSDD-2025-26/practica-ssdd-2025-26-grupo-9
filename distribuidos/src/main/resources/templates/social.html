    <main class="flex-grow-1 py-5">

                            style="width: 96px; height: 96px; object-fit: cover;">
                            
                            <h6 class="card-title fw-bold mb-1 w-100 text-truncate-custom">
                                <a href="profile.html" class="text-decoration-none text-dark stretched-link">Juan Pérez</a>

                    </div>
                </div>

                <div class="col">

                                <a href="profile.html" class="text-decoration-none text-dark stretched-link">Carlos López</a>

                            <p class="card-text text-muted small mb-3 w-100 text-truncate-custom">carlos@example.com</p>

            </div>
