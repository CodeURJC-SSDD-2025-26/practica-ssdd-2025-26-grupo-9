{{>header}}

<main class="flex-grow-1 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-12 col-lg-10">
                <div class="card shadow border-0 card-profile-edit">
                    <div class="card-header bg-white py-3">
                        <h1 class="h4 mb-0 text-secondary">Editar Usuario</h1>
                    </div>
                    <div class="card-body p-4">

                        <form action="/editUser" method="post" enctype="multipart/form-data">
                            <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">

                            <div class="mb-3">
                                <label for="user-name" class="form-label fw-bold text-secondary">Nombre de
                                    usuario</label>
                                <input type="text" class="form-control" id="user-name" name="username"
                                    value="{{user.username}}">
                            </div>

                            <div class="mb-3">
                                <label for="user-email" class="form-label fw-bold text-secondary">Correo
                                    electrónico</label>
                                <input type="email" class="form-control" id="user-email" name="email"
                                    value="{{user.email}}">
                            </div>

                            <div class="mb-3">
                                <label for="user-password" class="form-label fw-bold text-secondary">Nueva contraseña
                                    (dejar vacío para no cambiar)</label>
                                <input type="password" class="form-control" id="user-password" name="password">
                            </div>

                            <div class="mb-4">
                                <label for="user-image" class="form-label fw-bold text-secondary">
                                    Foto de perfil (opcional)
                                </label>
                                <input type="file" class="form-control" id="user-image" name="imageFile"
                                    accept="image/*">
                            </div>

                            <div class="d-grid gap-2">
                                <a href="/profile" class="btn btn-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary fw-bold">Guardar cambios</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
{{>footer}}
