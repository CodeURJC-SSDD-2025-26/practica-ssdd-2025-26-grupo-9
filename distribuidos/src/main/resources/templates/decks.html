{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="mb-0 fw-bold">Mazos de la Comunidad</h2>
                <a href="/addDeck" class="btn btn-primary fw-bold shadow-sm">Crear Mazo</a>
            </div>


            {{#decks}}
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <div class="row g-0">
                        <div class="col-md-3 col-lg-2 d-flex flex-column align-items-center justify-content-center border-end pe-3 mb-3 mb-md-0">
                            <img src="/profileimages/GomuGomuNoMi.jpg" class="rounded-circle mb-2" style="width: 80px; height: 80px; object-fit: cover; background-color: #ddd;">
                            <h6 class="mb-0 fw-bold">{{user.username}}</h6>
                            <small class="text-muted">17/05/01</small>
                        </div>
                        
                        <div class="col-md-9 col-lg-10 ps-md-4">
                            <div class="row row-cols-3 row-cols-md-6 g-2 mb-3">
                                {{#cards}}
                                <div class="col"><img src="/cardimages/{{name}}.png" class="img-fluid rounded border w-100" alt="{{name}}" style="aspect-ratio: 2/3; object-fit: cover; background-color: #eee;"></div>
                                {{/cards}}
                            </div>
                            <p class="card-text mb-0">{{description}}</p>
                        </div>
                    </div>

                    <hr class="text-muted mt-3 mb-3">
                    <div class="input-group input-group-sm mb-2">
                        <input type="text" class="form-control bg-light" placeholder="Escribe un comentario...">
                        <button class="btn btn-outline-secondary" type="button">Comentar</button>
                    </div>
                    <button class="btn btn-sm btn-light border text-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#commentsDeck{{id}}" aria-expanded="false" aria-controls="commentsDeck{{id}}">
                        Comentarios {{commentaries.size}}
                    </button>
                    <div class="collapse mt-2" id="commentsDeck{{id}}">
                        <div class="p-2 rounded bg-white border">
                            {{#commentaries}}
                            <p class="small mb-1"><strong>{{user.username}}</strong>: {{content}}</p>
                            {{/commentaries}}
                            {{^commentaries}}
                            <p class="small text-muted mb-0 fst-italic">Aún no hay comentarios. ¡Sé el primero!</p>
                            {{/commentaries}}
                        </div>
                    </div>
                </div>
            </div>
            {{/decks}}

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
{{>footer}}
