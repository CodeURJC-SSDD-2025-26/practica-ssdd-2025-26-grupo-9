{{#card}}
{{>header}}

<main class="flex-grow-1 py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">{{#id}}Editar Carta{{/id}}{{^id}}Nueva Carta{{/id}}</h3>
                        <a href="/addCards" class="btn btn-sm btn-secondary">← Volver</a>
                    </div>
                    <div class="card-body">
                        <form id="carta-form" action="/saveCard" method="POST" enctype="multipart/form-data">
                            <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">
                            
                            {{#id}}<input type="hidden" name="id" value="{{id}}">{{/id}}

                            <div class="row">
                                <div class="col-md-8">
                                    <div class="mb-3">
                                        <label for="name" class="form-label">Nombre</label>
                                        <input type="text" class="form-control" id="name" name="name" value="{{#name}}{{name}}{{/name}}" required>
                                    </div>
                                    <div class="mb-4">
                                        <label for="user-image" class="form-label fw-bold">Imagen (archivo):</label>
                                        <input type="file" class="form-control" id="user-image" name="imageFile" accept="image/*">
                                    </div>
                                </div>
                                <div class="col-md-4 text-center mb-3">
                                    <img id="preview-imagen" 
                                         src="{{#id}}/card/{{id}}/image{{/id}}{{^id}}/cardimages/Luffy.png{{/id}}" 
                                         class="img-fluid rounded border" style="max-height: 180px;">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="type" class="form-label">Tipo</label>
                                    <select class="form-select" id="type" name="type" required>
                                        <option value="LEADER">Líder</option>
                                        <option value="CHARACTER">Personaje</option>
                                        <option value="EVENT">Evento</option>
                                        <option value="STAGE">Estadio</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="cost" class="form-label">Coste</label>
                                    <input type="number" class="form-control" name="cost" value="{{#cost}}{{cost}}{{/cost}}{{^cost}}0{{/cost}}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="health" class="form-label">Vidas</label>
                                    <input type="number" class="form-control" name="health" value="{{#health}}{{health}}{{/health}}{{^health}}0{{/health}}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="power" class="form-label">Poder</label>
                                    <input type="number" class="form-control" name="power" value="{{#power}}{{power}}{{/power}}{{^power}}0{{/power}}">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="color" class="form-label">Color</label>
                                    <select class="form-select" id="color" name="color">
                                        <option value="RED">Rojo</option>
                                        <option value="GREEN">Verde</option>
                                        <option value="BLUE">Azul</option>
                                        <option value="YELLOW">Amarillo</option>
                                        <option value="PURPLE">Púrpura</option>
                                        <option value="BLACK">Negro</option>
                                    </select>
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="attribute" class="form-label">Atributo</label>
                                    <select class="form-select" id="attribute" name="attribute">
                                        <option value="STRIKE">Strike</option>
                                        <option value="SLASH">Slash</option>
                                        <option value="SPECIAL">Special</option>
                                        <option value="RANGED">Ranged</option>
                                        <option value="WISDOM">Wisdom</option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="crew" class="form-label">Tripulación / Clase</label>
                                    <input type="text" class="form-control" name="crew" value="{{#crew}}{{crew}}{{/crew}}">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="counter" class="form-label">Counter</label>
                                    <select class="form-select" id="counter" name="counter">
                                        <option value="NONE">Ninguno</option>
                                        <option value="ONETHOUSAND">+1000</option>
                                        <option value="TWOTHOUSAND">+2000</option>
                                    </select>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="description" class="form-label">Descripción</label>
                                <textarea class="form-control" name="description" rows="3">{{#description}}{{description}}{{/description}}</textarea>
                            </div>

                            <div class="mb-3">
                                <label for="triggerEffect" class="form-label">Efecto Trigger</label>
                                <textarea class="form-control" name="triggerEffect" rows="2">{{#triggerEffect}}{{triggerEffect}}{{/triggerEffect}}</textarea>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                                <button type="submit" class="btn btn-success btn-lg">
                                    {{#id}}Actualizar Carta{{/id}}{{^id}}Crear Carta{{/id}}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    // Vista previa de imagen
    document.getElementById('user-image').onchange = e => {
        const [file] = e.target.files;
        if (file) document.getElementById('preview-imagen').src = URL.createObjectURL(file);
    };

    // Sincronización de selects (SINTAXIS SEGURA)
    (function() {
        const data = {
            type: "{{#type}}{{type}}{{/type}}",
            color: "{{#color}}{{color}}{{/color}}",
            attr: "{{#attribute}}{{attribute}}{{/attribute}}",
            count: "{{#counter}}{{counter}}{{/counter}}"
        };
        
        if (data.type) document.getElementById('type').value = data.type;
        if (data.color) document.getElementById('color').value = data.color;
        if (data.attr) document.getElementById('attribute').value = data.attr;
        if (data.count) document.getElementById('counter').value = data.count;
    })();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{{>footer}}
{{/card}}
