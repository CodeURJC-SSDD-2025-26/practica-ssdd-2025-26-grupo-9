{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h3 class="mb-0">Gestionar Carta</h3>
                            <a href="/addCards" class="btn btn-sm btn-secondary">← Volver</a>
                        </div>
                        <div class="card-body">                              
                            <form id="carta-form" action="/saveCard" method="POST" enctype="multipart/form-data">
                                <input type="hidden" name="{{csrfParameterName}}" value="{{csrfToken}}">

                                <div class="row">
                                    <div class="col-md-8">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label for="name" class="form-label">Nombre</label>
                                                <input type="text" class="form-control" id="name" name="name" required>
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label for="user-image" class="form-label fw-bold text-secondary" >Imagen de la carta (archivo):</label>
                                            <input type="file" class="form-control" id="user-image" name="imageFile" accept="image/*">
                                        </div>
                                    </div>
                                    <div class="col-md-4 d-flex justify-content-center align-items-center mb-3">
                                        <img id="preview-imagen" src="/cardimages/Luffy.png" alt="Vista previa" class="img-fluid rounded border" style="max-height: 200px;">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="type" class="form-label">Tipo</label>
                                        <select class="form-select" id="type" name="type" required>
                                            <option value="">Seleccionar tipo</option>
                                            <option value="LEADER" selected>Líder</option>
                                            <option value="CHARACTER">Personaje</option>
                                            <option value="EVENT">Evento</option>
                                            <option value="STAGE">Estadio</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="cost" class="form-label">Coste</label>
                                        <input type="number" class="form-control" id="cost" name="cost" value="0">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="health" class="form-label">Vidas</label>
                                        <input type="number" class="form-control" id="health" name="health" value="5">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="power" class="form-label">Poder</label>
                                        <input type="number" class="form-control" id="power" name="power" value="5000">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="color" class="form-label">Color</label>
                                        <select class="form-select" id="color" name="color" required>
                                            <option value="">Seleccionar color</option>
                                            <option value="RED" selected>Rojo</option>
                                            <option value="GREEN">Verde</option>
                                            <option value="BLUE">Azul</option>
                                            <option value="YELLOW">Amarillo</option>
                                            <option value="PURPLE">Púrpura</option>
                                            <option value="BLACK">Negro</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="attribute" class="form-label">Atributo</label>
                                        <select class="form-select" id="attribute" name="attribute" required>
                                            <option value="">Seleccionar atributo</option>
                                            <option value="STRIKE">Strike</option>
                                            <option value="SLASH">Slash</option>
                                            <option value="SPECIAL">Special</option>
                                            <option value="RANGED">Ranged</option>
                                            <option value="WISDOM">Wisdom</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="counter" class="form-label">Counter</label>
                                        <select class="form-select" id="counter" name="counter">
                                            <option value="">Seleccionar Counter</option>
                                            <option value="ONETHOUSAND">ONETHOUSAND</option>
                                            <option value="TWOTHOUSAND">TWOTHOUSAND</option>
                                            <option value="NONE">NONE</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="crew" class="form-label">Clase</label>
                                        <input type="text" class="form-control" id="crew" name="crew" required value="Straw Hat Crew Pirates">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-label">Descripción</label>
                                    <textarea class="form-control" id="description" name="description" rows="3" placeholder="Descripción de la carta..." ></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="triggerEffect" class="form-label">Trigger</label>
                                    <textarea class="form-control" id="triggerEffect" name="triggerEffect" rows="2" placeholder="Efecto trigger (si procede)..."></textarea>
                                </div>

                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <button type="submit" class="btn btn-success">Guardar cambios</button>
                                </div>
                            </form>
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('user-image').addEventListener('change', function(event) {
            const [file] = event.target.files;
            if (file) {
                document.getElementById('preview-imagen').src = URL.createObjectURL(file);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{{>footer}}
