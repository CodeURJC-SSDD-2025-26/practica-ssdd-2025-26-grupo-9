{{>header}}

    <main class="flex-grow-1 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h3 class="mb-0">Gestionar Carta</h3>
                            <a href="/addCards" class="btn btn-sm btn-secondary">← Volver</a>
                        </div>
                        <div class="card-body">                              
                            <form id="carta-form">
                                <div class="row">
                                    <div class="col-md-8">
                                        <div class="row">
                                            <div class="col-md-6 mb-3">
                                                <label for="id" class="form-label">ID</label>
                                                <input type="text" class="form-control" id="id" name="id" readonly value="101">
                                            </div>
                                            <div class="col-md-6 mb-3">
                                                <label for="nombre" class="form-label">Nombre</label>
                                                <input type="text" class="form-control" id="nombre" name="nombre" required value="Luffy">
                                            </div>
                                        </div>
                                        <div class="mb-4">
                                            <label for="user-image" class="form-label fw-bold text-secondary">Imagen de la carta (archivo):</label>
                                            <input type="file" class="form-control" id="user-image" name="image" accept="image/*">
                                        </div>
                                    </div>
                                    <div class="col-md-4 d-flex justify-content-center align-items-center mb-3">
                                        <img id="preview-imagen" src="/cardimages/Luffy.png" alt="Vista previa" class="img-fluid rounded border" style="max-height: 200px;">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="tipo" class="form-label">Tipo</label>
                                        <select class="form-select" id="tipo" name="tipo" required>
                                            <option value="">Seleccionar tipo</option>
                                            <option value="Líder" selected>Líder</option>
                                            <option value="Personaje">Personaje</option>
                                            <option value="Evento">Evento</option>
                                            <option value="Estadio">Estadio</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="coste" class="form-label">Coste</label>
                                        <input type="number" class="form-control" id="coste" name="coste" value="0">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="vidas" class="form-label">Vidas</label>
                                        <input type="number" class="form-control" id="vidas" name="vidas" value="5">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-4 mb-3">
                                        <label for="poder" class="form-label">Poder</label>
                                        <input type="number" class="form-control" id="poder" name="poder" required value="5000">
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="color" class="form-label">Color</label>
                                        <select class="form-select" id="color" name="color" required>
                                            <option value="">Seleccionar color</option>
                                            <option value="Rojo" selected>Rojo</option>
                                            <option value="Verde">Verde</option>
                                            <option value="Azul">Azul</option>
                                            <option value="Amarillo">Amarillo</option>
                                            <option value="Púrpura">Púrpura</option>
                                            <option value="Negro">Negro</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4 mb-3">
                                        <label for="atributo" class="form-label">Atributo</label>
                                        <select class="form-select" id="atributo" name="atributo" required>
                                            <option value="">Seleccionar atributo</option>
                                            <option value="Strike">Strike</option>
                                            <option value="Slash">Slash</option>
                                            <option value="Special">Special</option>
                                            <option value="Ranged">Ranged</option>
                                            <option value="?">?</option>
                                            <option value="Wisdom">Wisdom</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="clase" class="form-label">Clase</label>
                                        <input type="text" class="form-control" id="clase" name="clase" required value="Straw Hat Crew Pirates">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="descripcion" class="form-label">Descripción</label>
                                    <textarea class="form-control" id="descripcion" name="descripcion" rows="3" placeholder="Descripción de la carta..."></textarea>
                                </div>

                                <div class="mb-3">
                                    <label for="trigger" class="form-label">Trigger</label>
                                    <textarea class="form-control" id="trigger" name="trigger" rows="2" placeholder="Efecto trigger (si procede)..."></textarea>
                                </div>

                                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                    <button type="submit" class="btn btn-success">Guardar cambios</button>
                                </div>
                            </form>
                            </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        
        document.getElementById('carta-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            alert(`Carta "${nombre}" guardada correctamente.`);
            // Future Backend
        });

        
        document.getElementById('user-image').addEventListener('change', function(event) {
            const [file] = event.target.files;
            if (file) {
                document.getElementById('preview-imagen').src = URL.createObjectURL(file);
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
{{>footer}}
